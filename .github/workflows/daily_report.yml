name: 美股聲報每日自動化更新

on:
  schedule:
    # 每天 UTC 時間 21:00 執行 (對應台灣時間清晨 05:00)
    # 留有 2 小時的緩衝時間，確保 07:00 前完成並發佈至 GitHub Pages
    - cron: '0 21 * * *'
  workflow_dispatch:
    # 允許手動觸發，方便測試

permissions:
  contents: write # 必須授予寫入權限，才能提交生成的檔案回儲存庫

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出儲存庫程式碼
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 安裝系統依賴 (FFmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: 安裝 Python 依賴函式庫
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 執行美股動態抓取與聲報生成
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python main.py

    - name: 提交更新與歸檔檔案
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 檢查是否有檔案更新
        git add docs/
        if git diff --cached --quiet; then
          echo "沒有新生成的檔案需要提交。"
        else
          git commit -m "docs: 每日美股焦點聲報自動更新 [$(date +'%Y-%m-%d')]"
          git push origin main
        fi
